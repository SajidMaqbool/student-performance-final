<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudenTrak Portal Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #121212; color: white; margin-top: 8%; }</style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card bg-dark text-white p-4 shadow border-secondary">
                <h3 class="text-center mb-4">🔐 Django StudenTrak</h3>
                
                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert alert-info p-2 text-center small">{{ msg }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control bg-secondary text-white border-0" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control bg-secondary text-white border-0" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" name="action" value="login" class="btn btn-primary fw-bold">Sign In</button>
                        <button type="submit" name="action" value="register" class="btn btn-outline-success">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
